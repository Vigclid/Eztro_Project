name: Build and deploy Node.js app to Azure Web App - my-unique-app-name-12345

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: Backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm install

      - name: Build Backend
        run: npm run build --if-present

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CF764337F61847DF8B35E1520E2AEFBA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_85A1950907414149BF3BB46C2AD9E5B2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_108F6E5FA74F4367A4065AEF11BCED7F }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
        with:
          app-name: 'EzTro'
          slot-name: 'Production'
          package: ./Backend
